name: Build iOS

on:
  workflow_dispatch:

env:
  GODOT_VERSION: 4.6-stable
  GODOT_VERSION_DIR: 4.6.stable
  GODOT_PROJECT_PATH: .
  GODOT_PRESET: iOS
  IOS_PROJECT_NAME: CatMemeClicker
  IOS_BUILD_DIR: build/ios

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/build_profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          PROFILE_UUID="$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)"
          PROFILE_NAME="$(security cms -D -i "$PROFILE_PATH" | plutil -extract Name raw -)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          {
            echo "PROFILE_UUID=$PROFILE_UUID"
            echo "PROFILE_NAME=$PROFILE_NAME"
          } >> "$GITHUB_ENV"

      - name: Install Godot editor and export templates
        run: |
          set -euo pipefail

          curl -L -o "$RUNNER_TEMP/godot.zip" \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_macos.universal.zip"
          unzip -q "$RUNNER_TEMP/godot.zip" -d "$RUNNER_TEMP/godot"

          curl -L -o "$RUNNER_TEMP/godot_templates.tpz" \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"

          mkdir -p "$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION_DIR}"
          unzip -q "$RUNNER_TEMP/godot_templates.tpz" -d "$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION_DIR}"

          echo "GODOT_BIN=$RUNNER_TEMP/godot/Godot.app/Contents/MacOS/Godot" >> "$GITHUB_ENV"

      - name: Export Godot iOS project
        run: |
          set -euo pipefail

          mkdir -p "$IOS_BUILD_DIR"
          "$GODOT_BIN" --headless --path "$GODOT_PROJECT_PATH" --export-release "$GODOT_PRESET" "$IOS_BUILD_DIR/$IOS_PROJECT_NAME.xcodeproj"

      - name: Discover Xcode scheme
        run: |
          set -euo pipefail

          PROJECT_PATH="$(find "$IOS_BUILD_DIR" -maxdepth 2 -name '*.xcodeproj' | head -n 1)"
          if [ -z "$PROJECT_PATH" ]; then
            echo "No Xcode project was exported."
            exit 1
          fi

          SCHEME="$(xcodebuild -list -project "$PROJECT_PATH" | awk '/Schemes:/{getline; gsub(/^[[:space:]]+/, ""); print; exit}')"
          if [ -z "$SCHEME" ]; then
            echo "No Xcode scheme found in exported project."
            exit 1
          fi

          {
            echo "XCODE_PROJECT_PATH=$PROJECT_PATH"
            echo "XCODE_SCHEME=$SCHEME"
          } >> "$GITHUB_ENV"

      - name: Archive iOS app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
        run: |
          set -euo pipefail

          xcodebuild \
            -project "$XCODE_PROJECT_PATH" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$IOS_BUILD_DIR/$IOS_PROJECT_NAME.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            archive

      - name: Create export options plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
        run: |
          cat > "$IOS_BUILD_DIR/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>app-store</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          set -euo pipefail

          xcodebuild \
            -exportArchive \
            -archivePath "$IOS_BUILD_DIR/$IOS_PROJECT_NAME.xcarchive" \
            -exportPath "$IOS_BUILD_DIR/export" \
            -exportOptionsPlist "$IOS_BUILD_DIR/ExportOptions.plist"

      - name: Upload to App Store Connect
        env:
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf "%s" "$APPSTORE_API_PRIVATE_KEY" > "$HOME/.appstoreconnect/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8"

          IPA_PATH="$(find "$IOS_BUILD_DIR/export" -maxdepth 1 -name '*.ipa' | head -n 1)"
          if [ -z "$IPA_PATH" ]; then
            echo "IPA export failed."
            exit 1
          fi

          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_API_ISSUER_ID"
